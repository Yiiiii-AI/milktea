<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>奶茶博物馆 - 奶茶搭配</title>
    <link rel="stylesheet" href="./static/css/common.css" />
    <link rel="stylesheet" href="./static/css/pairing.css" />
  </head>
  <body>
    <div class="pr-page page-root">
      <!-- 顶部导航 -->
      <div class="pr-nav">
        <div class="pr-nav-brand">
          <div class="pr-nav-logo">
            <img src="./static/images/mou9e9di-x9rffmy.png" class="pr-nav-icon" alt="奶茶博物馆" />
            <div class="pr-nav-brand-text">
              <p class="pr-nav-name">奶茶隐藏喝法</p>
              <p class="pr-nav-slogan">和全网一起分享宝藏搭配</p>
            </div>
          </div>
        </div>
        <div class="pr-nav-search">
          <img src="./static/images/mou9e3r0-au2v2zb.svg" class="pr-nav-search-icon" alt="" />
          <p class="pr-nav-search-text">搜索索你喜欢的奶茶品牌...</p>
        </div>
        <div class="pr-nav-links">
          <a class="pr-nav-link pr-nav-link--active" href="./index.html">首页&nbsp;</a>
          <a class="pr-nav-link" href="./map.html">地图&nbsp;</a>
          <a class="pr-nav-link" href="./ranking.html">排行榜&nbsp;</a>
          <a class="pr-nav-link" href="./news.html">关于&nbsp;</a>
        </div>
        <div class="pr-nav-actions">
          <button class="pr-nav-publish">
            <span class="pr-nav-publish-icon">+</span>
            <span>发布</span>
          </button>
          <div class="pr-nav-avatar">
            <img src="./static/images/mou9e3rs-j0if8y2.png" class="pr-nav-avatar-img" alt="" />
          </div>
        </div>
      </div>

      <!-- 主内容区 -->
      <div class="pr-main">
        <!-- 今日最新搭配 -->
        <div class="pr-section">
          <div class="pr-section-header">
            <div class="pr-section-title-wrap">
              <h2 class="pr-section-title">今日最新搭配</h2>
              <p class="pr-section-subtitle">每天都有新喝法等你发现，大家都在喝的神仙搭配</p>
            </div>
            <a class="pr-view-all" href="javascript:void(0)">
              <span>查看全部</span>
              <img src="./static/images/mou9e3r1-7eg7drt.svg" class="pr-view-all-icon" alt="" />
            </a>
          </div>

          <!-- 统一瀑布流容器：用户帖子 + 静态卡片 -->
          <div class="pr-grid" id="userPostsGrid"></div>
        </div>

        <!-- 加载更多 -->
        <div class="pr-load-more">
          <button class="pr-load-btn" onclick="loadMore(this)">加载更多精彩内容</button>
        </div>
      </div>

      <!-- 页脚 -->
      <div class="pr-footer">
        <div class="pr-footer-logo">
          <img src="./static/images/mou9e3rr-ir30nso.png" class="pr-footer-icon" alt="奶茶博物馆" />
          <p class="pr-footer-name">奶茶博物馆</p>
        </div>
        <div class="pr-footer-about">
          <p class="pr-footer-title">关于我们</p>
          <p class="pr-footer-desc">关于奶茶的一切都在这座博物馆！<br />发现美味 · 记录生活 · 分享快乐</p>
        </div>
        <div class="pr-footer-contact">
          <p class="pr-footer-title">联系我们</p>
          <div class="pr-footer-icons">
            <img src="./static/images/mou9e3r1-2b4t9te.svg" class="pr-footer-social" alt="" />
            <img src="./static/images/mou9e3r1-4vmdcwg.svg" class="pr-footer-social" alt="" />
            <img src="./static/images/mou9e3r1-7z5ee9b.svg" class="pr-footer-social" alt="" />
            <img src="./static/images/mou9e3r1-d21x72i.svg" class="pr-footer-social" alt="" />
          </div>
        </div>
      </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="pr-modal" id="prModal" onclick="closeModal(event)">
      <div class="pr-modal-content">
        <button class="pr-modal-close" onclick="document.getElementById('prModal').style.display='none'">✕</button>
        <img id="modalImg" src="" class="pr-modal-img" alt="" />
        <div class="pr-modal-body">
          <p class="pr-modal-name" id="modalName"></p>
          <div class="pr-modal-tags" id="modalTags"></div>
          <div class="pr-modal-actions">
            <button class="pr-modal-like-btn" onclick="toggleLike(this)">
              <img src="./static/images/mou9e3r1-gbikfig.svg" style="width:16px;height:16px;" alt="" />
              点赞
            </button>
            <button class="pr-modal-collect-btn">收藏搭配</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 发布弹窗 -->
    <div class="pr-publish-modal" id="publishModal">
      <div class="pr-publish-content">
        <button class="pr-publish-close" onclick="hidePublishModal()">✕</button>
        <h2 class="pr-publish-title">发布新搭配</h2>

        <div class="pr-form-group">
          <label class="pr-form-label">奶茶品牌</label>
          <input type="text" class="pr-form-input" id="postBrand" placeholder="请输入奶茶品牌，如：古茗" />
        </div>

        <div class="pr-form-group">
          <label class="pr-form-label">奶茶名称</label>
          <input type="text" class="pr-form-input" id="postName" placeholder="请输入奶茶名称，如：茉香云顶抹茶" />
        </div>

        <div class="pr-form-group">
          <label class="pr-form-label">搭配标签</label>
          <div class="pr-tag-category">
            <span class="pr-tag-cat-label">甜度</span>
            <div class="pr-tag-selector">
              <button class="pr-tag-option pr-tag-option--sugar">无糖</button>
              <button class="pr-tag-option pr-tag-option--sugar">三分糖</button>
              <button class="pr-tag-option pr-tag-option--sugar">五分糖</button>
              <button class="pr-tag-option pr-tag-option--sugar">七分糖</button>
              <button class="pr-tag-option pr-tag-option--sugar">少糖</button>
              <button class="pr-tag-option pr-tag-option--sugar">全糖</button>
            </div>
          </div>
          <div class="pr-tag-category">
            <span class="pr-tag-cat-label">冰量</span>
            <div class="pr-tag-selector">
              <button class="pr-tag-option pr-tag-option--ice">去冰</button>
              <button class="pr-tag-option pr-tag-option--ice">少冰</button>
              <button class="pr-tag-option pr-tag-option--ice">标准冰</button>
              <button class="pr-tag-option pr-tag-option--ice">多冰</button>
              <button class="pr-tag-option pr-tag-option--ice">温热</button>
              <button class="pr-tag-option pr-tag-option--ice">热</button>
            </div>
          </div>
          <div class="pr-tag-category">
            <span class="pr-tag-cat-label">加料</span>
            <div class="pr-tag-selector">
              <button class="pr-tag-option pr-tag-option--add">波霸</button>
              <button class="pr-tag-option pr-tag-option--add">珍珠</button>
              <button class="pr-tag-option pr-tag-option--add">椰果</button>
              <button class="pr-tag-option pr-tag-option--add">芋泥</button>
              <button class="pr-tag-option pr-tag-option--add">黑糖珍珠</button>
              <button class="pr-tag-option pr-tag-option--add">坚果碎</button>
              <button class="pr-tag-option pr-tag-option--add">奶芙</button>
              <button class="pr-tag-option pr-tag-option--add">布丁</button>
            </div>
          </div>
        </div>

        <div class="pr-form-group">
          <label class="pr-form-label">奶茶图片</label>
          <div class="pr-upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="previewImage(event)" />
            <span class="pr-upload-placeholder">点击上传奶茶图片</span>
            <img id="imagePreview" class="pr-upload-preview" style="display:none" alt="" />
          </div>
        </div>

        <div class="pr-form-group">
          <label class="pr-form-label">你的昵称</label>
          <input type="text" class="pr-form-input" id="postUsername" placeholder="请输入你的昵称" />
        </div>

        <div class="pr-form-group">
          <label class="pr-form-label">头像（可选）</label>
          <div class="pr-avatar-upload" onclick="document.getElementById('avatarInput').click()">
            <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="previewAvatar(event)" />
            <img id="avatarPreview" class="pr-avatar-preview" src="./static/images/mou9e3rs-j0if8y2.png" alt="" />
            <span class="pr-avatar-hint">点击更换头像</span>
          </div>
        </div>

        <button class="pr-btn-upload" onclick="submitPost()">一键上传</button>
      </div>
    </div>

    <script>
      function openCard(card) {
        const modal = document.getElementById('prModal');
        const img = card.querySelector('.pr-card-img');
        const name = card.querySelector('.pr-card-name');
        const tags = card.querySelector('.pr-card-tags');
        document.getElementById('modalImg').src = img.src;
        document.getElementById('modalName').textContent = name.textContent;
        document.getElementById('modalTags').innerHTML = tags.innerHTML;
        modal.style.display = 'flex';
      }

      function closeModal(e) {
        if (e.target === document.getElementById('prModal')) {
          document.getElementById('prModal').style.display = 'none';
        }
      }

      function toggleLike(btn) {
        btn.classList.toggle('pr-modal-like-btn--liked');
        btn.textContent = btn.classList.contains('pr-modal-like-btn--liked') ? '已点赞 ♥' : '点赞';
      }

      function loadMore(btn) {
        btn.textContent = '加载中...';
        btn.disabled = true;
        setTimeout(() => {
          btn.textContent = '已加载全部精彩内容';
        }, 1200);
      }

      // 瀑布流卡片数据（静态卡片）
      var STATIC_CARDS = [
        { img: './static/images/mou9e3rs-bs8rw0z.png', name: 'KOI·比利时奶酪', tags: [{text:'七分糖',type:'sugar'},{text:'少冰',type:'ice'},{text:'波霸',type:'add'}], avatar: './static/images/mou9e3rs-j0if8y2.png', username: '777777', likes: '1.2k' },
        { img: './static/images/mou9e3rs-1xfqoav.png', name: '茉莉奶白·莓莓白巧米麻薯', tags: [{text:'三分糖',type:'sugar'},{text:'温热',type:'ice'},{text:'黑糖珍珠',type:'add'}], avatar: './static/images/mou9e3rs-53yutl6.png', username: '一只草莓控', likes: '3.5k' },
        { img: './static/images/mou9e3rs-uyum1y2.png', name: '古茗·茉香云顶抹茶', tags: [{text:'七分糖',type:'sugar'},{text:'少冰',type:'ice'},{text:'奶芙',type:'special'},{text:'坚果碎',type:'add'}], avatar: './static/images/mou9e3rs-j7ljwqj.png', username: '喝奶茶第一名', likes: '1.2k' },
        { img: './static/images/mou9e3rs-lr10ds5.png', name: '一点点·蔓越莓奶绿', tags: [{text:'三分糖',type:'sugar'},{text:'少冰',type:'ice'},{text:'椰子冻',type:'special'},{text:'小珍珠',type:'add'}], avatar: './static/images/mou9e3rs-10gggo0.png', username: '点门掌门人', likes: '1.1k' },
        { img: './static/images/mou9e3rs-ybuqao6.png', name: '李山山茶事·陌上青提', tags: [{text:'少糖',type:'sugar'},{text:'标准冰',type:'ice'}], avatar: './static/images/mou9e3rs-e55w3os.png', username: 'aurora', likes: '1.2k' },
        { img: './static/images/mou9e3rs-whs7oyb.png', name: '山下奶市·香草籽树莓芭乐冰', tags: [{text:'少糖',type:'sugar'},{text:'标准冰',type:'ice'},{text:'波霸',type:'add'}], avatar: './static/images/mou9e3rs-vuv4kdr.png', username: '232', likes: '1.1k' },
        { img: './static/images/mou9e3rs-p1rrs9q.png', name: '一点点·奶香普洱', tags: [{text:'三分糖',type:'sugar'},{text:'温热',type:'ice'},{text:'波霸',type:'add'}], avatar: './static/images/mou9e3rs-8os0phf.png', username: '圆圆璃', likes: '3.5k' },
        { img: './static/images/mou9e3rs-6uo8t4u.png', name: '茉莉奶白·抹茶白兰成酪乳', tags: [{text:'少糖',type:'sugar'},{text:'奶冰',type:'ice'}], avatar: './static/images/mou9e3rs-wnor2rv.png', username: '抹茶甜袋', likes: '1.1k' },
        { img: './static/images/mou9e3rs-xa13vps.png', name: '喜茶·椰芒芒', tags: [{text:'少糖',type:'sugar'},{text:'少冰',type:'ice'},{text:'芋泥冻',type:'special'},{text:'坚果碎',type:'add'}], avatar: './static/images/mou9e3rs-z16xou0.png', username: '嘉茶死忠粉', likes: '1.1k' },
        { img: './static/images/mou9e3rs-bv4265z.png', name: '爷爷不泡茶·兰香青柠', tags: [{text:'七分糖',type:'sugar'},{text:'少冰',type:'ice'},{text:'奶芙',type:'special'},{text:'坚果碎',type:'add'}], avatar: './static/images/mou9e3rs-yxvwycn.png', username: '奶茶大王', likes: '1.1k' }
      ];

      // 渲染一张卡片
      function createCard(cardData) {
        var card = document.createElement('div');
        card.className = 'pr-card';
        card.onclick = function() { openCard(this); };

        var tagsHtml = cardData.tags.map(function(t) {
          return '<span class="pr-tag pr-tag--' + t.type + '">' + t.text + '</span>';
        }).join('');

        var avatarHtml = cardData.avatar
          ? '<img src="' + cardData.avatar + '" class="pr-card-avatar" alt="" />'
          : '<div class="pr-card-avatar" style="background:#e94560;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;">' + (cardData.username ? cardData.username.charAt(0).toUpperCase() : 'U') + '</div>';

        card.innerHTML = [
          '<div class="pr-card-img-wrap"><img src="' + cardData.img + '" class="pr-card-img" alt="' + cardData.name + '" /></div>',
          '<div class="pr-card-body">',
          '  <p class="pr-card-name">' + cardData.name + '</p>',
          '  <div class="pr-card-tags">' + tagsHtml + '</div>',
          '  <div class="pr-card-footer">',
          '    <div class="pr-card-user">' + avatarHtml + '<span class="pr-card-username">' + cardData.username + '</span></div>',
          '    <div class="pr-card-likes"><img src="./static/images/mou9e3r1-gbikfig.svg" class="pr-card-like-icon" alt="" /><span class="pr-card-like-num">' + (cardData.likes || '0') + '</span></div>',
          '  </div>',
          '</div>'
        ].join('');

        return card;
      }

      // 加载所有卡片（用户帖子 + 静态卡片）
      function loadUserPosts() {
        var container = document.getElementById('userPostsGrid');
        container.innerHTML = '';

        // 1. 渲染用户上传的帖子
        var userPosts = JSON.parse(localStorage.getItem('userPosts') || '[]');
        userPosts.forEach(function(post) {
          var tags = post.tags.map(function(text, i) {
            var type = i === 0 ? 'sugar' : i === 1 ? 'ice' : 'add';
            return { text: text, type: type };
          });
          container.appendChild(createCard({
            img: post.image,
            name: post.brand + '·' + post.name,
            tags: tags,
            avatar: post.avatar || null,
            username: post.username,
            likes: '0'
          }));
        });

        // 2. 渲染静态卡片
        STATIC_CARDS.forEach(function(c) {
          container.appendChild(createCard(c));
        });
      }

      // 页面加载时渲染用户帖子
      loadUserPosts();

      // ===== 发布弹窗逻辑 =====
      const publishModal = document.getElementById('publishModal');

      function showPublishModal() {
        publishModal.style.display = 'flex';
      }

      function hidePublishModal() {
        publishModal.style.display = 'none';
        resetPublishForm();
      }

      function resetPublishForm() {
        document.getElementById('postBrand').value = '';
        document.getElementById('postName').value = '';
        document.getElementById('postUsername').value = '';
        document.querySelectorAll('.pr-tag-option.is-selected').forEach(function(el) { el.classList.remove('is-selected'); });
        document.getElementById('imageInput').value = '';
        var imgPrev = document.getElementById('imagePreview');
        imgPrev.style.display = 'none';
        imgPrev.src = '';
        document.querySelector('.pr-upload-placeholder').style.display = 'block';
        document.getElementById('avatarInput').value = '';
        document.getElementById('avatarPreview').src = './static/images/mou9e3rs-j0if8y2.png';
      }

      // 点击遮罩关闭
      publishModal.onclick = function(e) {
        if (e.target === publishModal) {
          hidePublishModal();
        }
      };

      // 标签选择
      document.querySelectorAll('.pr-tag-option').forEach(function(btn) {
        btn.onclick = function() {
          this.classList.toggle('is-selected');
        };
      });

      // 奶茶图片预览
      function previewImage(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          var preview = document.getElementById('imagePreview');
          preview.src = e.target.result;
          preview.style.display = 'block';
          document.querySelector('.pr-upload-placeholder').style.display = 'none';
        };
        reader.readAsDataURL(file);
      }

      // 头像预览
      function previewAvatar(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('avatarPreview').src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // 提交帖子
      function submitPost() {
        var brand = document.getElementById('postBrand').value.trim();
        var name = document.getElementById('postName').value.trim();
        var username = document.getElementById('postUsername').value.trim();
        var imagePreview = document.getElementById('imagePreview');
        var image = imagePreview.src;
        var avatar = document.getElementById('avatarPreview').src;

        // 表单验证
        if (!brand) { alert('请输入奶茶品牌'); return; }
        if (!name) { alert('请输入奶茶名称'); return; }
        if (!username) { alert('请输入你的昵称'); return; }

        var selectedTags = [];
        document.querySelectorAll('.pr-tag-option.is-selected').forEach(function(el) {
          selectedTags.push(el.textContent.trim());
        });
        if (selectedTags.length === 0) { alert('请至少选择一个搭配标签'); return; }

        if (!image || imagePreview.style.display === 'none') { alert('请上传奶茶图片'); return; }

        // 构造帖子对象
        var post = {
          brand: brand,
          name: name,
          tags: selectedTags,
          image: image,
          username: username,
          avatar: avatar,
          timestamp: Date.now()
        };

        // 存入 localStorage
        try {
          var posts = JSON.parse(localStorage.getItem('userPosts') || '[]');
          posts.unshift(post);
          localStorage.setItem('userPosts', JSON.stringify(posts));
        } catch (e) {
          alert('图片过大，请压缩后重试');
          return;
        }

        // 反馈与重新渲染
        var btn = document.querySelector('.pr-btn-upload');
        btn.textContent = '上传中...';
        btn.disabled = true;
        setTimeout(function() {
          btn.textContent = '发布成功！';
          setTimeout(function() {
            hidePublishModal();
            btn.textContent = '一键上传';
            btn.disabled = false;
            loadUserPosts();
          }, 400);
        }, 500);
      }

      // 绑定发布按钮
      document.querySelector('.pr-nav-publish').onclick = showPublishModal;
    </script>
  </body>
</html>
